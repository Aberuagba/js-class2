<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorify</title>
    <style type="text/css">


        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .circle{
            border:1px solid #000000;
            width: 200px;
            height: 200px;
            border-radius: 100px;
        }

        .action {
            margin: 10px;
        }

        button{
            cursor:pointer;
        }




    </style>
</head>
<body>
    
    <div class="container">
        <p class="subheading">Javascript Project Snippet</p>

        <div class="circle" id="circleID"></div>

        <div class="action">
            <button onclick="paint('purple')">Purple</button>
            <button onclick="paint('orange')">Orange</button>
            <button onclick="paint('red')">Red</button>
            <button onclick="paint('blue')">Blue</button>
            <button onclick="paint('green')">Green</button>

            
        </div>
    </div>

    <script type="text/javascript">
        function paint(color){
            document.getElementById('circleID').style.backgroundColor =`${color}`;
        }
    </script>
</body>
</html>
